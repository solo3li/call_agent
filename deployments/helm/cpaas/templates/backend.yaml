{{- if .Values.backend.enabled }}
---
# ── ASP.NET Backend Deployment ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  labels:
    app: backend-api
    {{- include "cpaas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.backend.port }}"
    spec:
      containers:
        - name: backend-api
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.backend.port }}"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: cpaas-backend-secrets
                  key: db-connection-string
            {{- include "cpaas.livekitEnvVars" . | nindent 12 }}
            - name: GO_AGENT_URL
              value: "http://go-agent.{{ .Values.global.namespaces.aiEngine }}.svc.cluster.local:{{ .Values.goAgent.port }}"
            - name: FreeSWITCH__Host
              value: "freeswitch-svc.{{ .Values.global.namespaces.voipCore }}.svc.cluster.local"
            - name: FreeSWITCH__Port
              value: "{{ .Values.freeswitch.ports.esl }}"
            - name: FreeSWITCH__Password
              valueFrom:
                secretKeyRef:
                  name: cpaas-freeswitch-secrets
                  key: esl-password
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: cpaas-backend-secrets
                  key: jwt-key
            - name: Jwt__Issuer
              value: {{ .Values.backend.jwt.issuer | quote }}
            - name: Jwt__Audience
              value: {{ .Values.backend.jwt.audience | quote }}
            {{- include "cpaas.internalKeyEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/internal/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/internal/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
spec:
  type: ClusterIP
  selector:
    app: backend-api
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
---
{{- if .Values.backend.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-api
  minReplicas: {{ .Values.backend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.backend.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}

