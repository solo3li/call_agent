[rtpengine]
# Listen interface for NG control protocol (from OpenSIPS)
listen-ng = 0.0.0.0:22222

# Network interface to use for RTP media
# Set via environment variable or override here
interface = DETECTED_INTERFACE

# RTP port range (10,000 ports = 5,000 concurrent calls)
port-min = 20000
port-max = 30000

# Logging
log-level = 6
log-stderr = true

# TOS marking for VoIP QoS (DSCP EF = 46 for voice)
tos = 184

# Timeout for inactive RTP streams (seconds)
timeout = 60
silent-timeout = 3600

# Recording (disabled by default, enable for compliance)
# recording-dir = /var/lib/rtpengine/recordings
# recording-method = proc

# DTLS/SRTP for WebRTC interoperability
# Enable to handle SRTP↔RTP transcoding between PSTN and WebRTC
dtls-passive = true

# Redis for state storage (enables multi-node rtpengine clustering)
# redis = 127.0.0.1:6379/5
# redis-write = 127.0.0.1:6379/5

# Homer/HEP support for call mirroring
# homer = 127.0.0.1:9060
# homer-protocol = udp
# homer-id = 10
