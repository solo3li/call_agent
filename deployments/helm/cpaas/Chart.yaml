apiVersion: v2
name: cpaas
description: |
  Omni-Industry Voice AI CPaaS Platform
  Architecture v2.0: OpenSIPS + rtpengine + FreeSWITCH + LiveKit + MetalLB + Traefik
type: application
version: 2.0.0
appVersion: "2.0.0"
keywords:
  - voip
  - ai
  - cpaas
  - freeswitch
  - opensips
  - livekit
  - gemini
maintainers:
  - name: CPaaS Team

dependencies:
  # ── Data Layer ──────────────────────────────────────
  - name: postgresql
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
    alias: postgresql

  - name: redis
    version: "27.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    alias: redis

  - name: minio
    version: "5.x.x"
    repository: https://charts.min.io/
    condition: minio.enabled
    alias: minio

  # ── Ingress & Load Balancing ─────────────────────────
  - name: traefik
    version: "28.x.x"
    repository: https://helm.traefik.io/traefik
    condition: traefik.enabled
    alias: traefik

  # ── LiveKit ──────────────────────────────────────────
  - name: livekit-server
    version: "1.x.x"
    repository: https://helm.livekit.io
    condition: livekit.enabled
    alias: livekit
