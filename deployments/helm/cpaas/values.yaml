##########################################################
# CPaaS Helm Chart — values.yaml
# Architecture v2.0: OpenSIPS + rtpengine + FreeSWITCH + LiveKit
#
# Override per environment:
#   helm upgrade --install cpaas . -f values-prod.yaml
##########################################################

# ── Global ──────────────────────────────────────────────────────
global:
  # Your domain (used for Traefik Ingress routes)
  domain: "cpaas.example.com"
  # Image pull policy: Always (prod) | IfNotPresent (dev)
  imagePullPolicy: IfNotPresent
  # Image registry prefix (leave empty for local images)
  imageRegistry: ""
  # Internal shared secret between all services
  internalApiKey: "CHANGE_ME_INTERNAL_KEY"
  # Namespace overrides (defaults to chart defaults)
  namespaces:
    voipEdge: "voip-edge"
    voipCore: "voip-core"
    aiEngine: "ai-engine"
    controlPlane: "control-plane"
    data: "cpaas-data"
    monitoring: "monitoring"

# ── MetalLB ─────────────────────────────────────────────────────
metallb:
  enabled: true
  ipAddressPools:
    voip:
      name: voip-pool
      addresses:
        - "192.168.1.200-192.168.1.210"   # CHANGE to your network
    web:
      name: web-pool
      addresses:
        - "192.168.1.220-192.168.1.230"   # CHANGE to your network

# ── Traefik ─────────────────────────────────────────────────────
traefik:
  enabled: true
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/address-pool: web-pool
  ingressRoute:
    dashboard:
      enabled: false   # Disable Traefik dashboard in production
  additionalArguments:
    - "--certificatesresolvers.letsencrypt.acme.email=ssl@example.com"
    - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
    - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    - "--entrypoints.web.address=:80"
    - "--entrypoints.websecure.address=:443"

# ── OpenSIPS ────────────────────────────────────────────────────
opensips:
  enabled: true
  replicaCount: 1
  image:
    repository: cpaas/opensips
    tag: "3.5-fixed-3"
  service:
    type: LoadBalancer
    annotations:
      metallb.universe.tf/address-pool: voip-pool
      metallb.universe.tf/loadBalancerIPs: "192.168.1.200"
  ports:
    sip: 5060
    hep: 9060
    mi: 8888
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  config:
    # Reference to FreeSWITCH StatefulSet headless service
    freeswitchDNS: "freeswitch-hs.voip-core.svc.cluster.local"
    freeswitchPort: 5080
    rtpengineDNS: "rtpengine-svc.voip-edge.svc.cluster.local"
    rtpenginePort: 22222

# ── rtpengine ───────────────────────────────────────────────────
rtpengine:
  enabled: true
  # DaemonSet: runs on every node labeled node-role=voip
  nodeSelector:
    node-role: "voip"
  ports:
    ngControl: 22222
    rtpMin: 20000
    rtpMax: 30000
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

# ── FreeSWITCH ───────────────────────────────────────────
freeswitch:
  enabled: true
  replicaCount: 1   # StatefulSet
  image:
    repository: cpaas/freeswitch
    tag: "1.10"
  domain: "freeswitch.cpaas.local"
  ports:
    sipExternal: 5080
    sipInternal: 5060
    esl: 8021
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  persistence:
    logs:
      size: "5Gi"
      storageClass: ""
  # ESL password — override via --set or secrets
  eslPassword: "CHANGE_ME_ESL_PASSWORD"

# ── LiveKit Server ─────────────────────────────────────────
livekit:
  enabled: true
  replicaCount: 1
  image:
    repository: livekit/livekit-server
    tag: "latest"
  livekit:
    keys:
      "CHANGE_ME_LK_KEY": "CHANGE_ME_LK_SECRET_32_CHARS_MIN"
    rtc:
      tcp_port: 7881
      port_range_start: 50000
      port_range_end: 60000
      use_external_ip: false

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  webhook:
    apiKey: "CHANGE_ME_LK_KEY"
    urls:
      - "http://backend-api.control-plane.svc.cluster.local:8080/api/webhook/livekit"

# ── LiveKit SIP Gateway ────────────────────────────────
livekitSip:
  enabled: false
  replicaCount: 1
  image:
    repository: livekit/sip
    tag: "latest"
  port: 5060
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── Go AI Agent ──────────────────────────────────────────────────
goAgent:
  enabled: true
  replicaCount: 2
  image:
    repository: cpaas/go-agent
    tag: "latest"
  port: 8080
  aiProvider: "gemini"
  geminiApiKey: "CHANGE_ME_GEMINI_KEY"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 50
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# ── ASP.NET Backend ──────────────────────────────────────────────
backend:
  enabled: true
  replicaCount: 2
  image:
    repository: cpaas/backend
    tag: "latest"
  port: 8080
  jwt:
    key: "CHANGE_ME_JWT_KEY_32_CHARS_MINIMUM"
    issuer: "cpaas-auth"
    audience: "cpaas-frontend"
  ingress:
    host: "api.cpaas.example.com"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# ── React Frontend ───────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: cpaas/frontend
    tag: "latest"
  port: 80
  ingress:
    host: "app.cpaas.example.com"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# ── PostgreSQL (Bitnami) ─────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: "cpaas"
    password: "CHANGE_ME_PG_PASS"
    database: "cpaas_db"
  primary:
    persistence:
      size: "20Gi"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
  readReplicas:
    replicaCount: 1

# ── Redis (Bitnami) ──────────────────────────────────────────────
redis:
  enabled: true
  auth:
    enabled: true
    password: "CHANGE_ME_REDIS_PASS"
  architecture: standalone
  master:
    persistence:
      size: "8Gi"

# ── MinIO (official chart) ───────────────────────────────────────
minio:
  enabled: true
  rootUser: "admin"
  rootPassword: "CHANGE_ME_MINIO_PASS"
  mode: standalone
  replicas: 1
  persistence:
    enabled: true
    size: "10Gi"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  buckets:
    - name: recordings
      policy: public
      purge: false
    - name: knowledge-base
      policy: public
      purge: false

# ── Monitoring ───────────────────────────────────────────────────
monitoring:
  prometheus:
    enabled: true
    retention: "30d"
  grafana:
    enabled: true
    adminPassword: "CHANGE_ME_GRAFANA_PASS"
    dashboards:
      voip: true
      ai: true
