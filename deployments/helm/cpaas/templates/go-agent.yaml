{{- if .Values.goAgent.enabled }}
---
# ── Go AI Agent Deployment ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-agent
  namespace: {{ .Values.global.namespaces.aiEngine }}
  labels:
    app: go-agent
    {{- include "cpaas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.goAgent.replicaCount }}
  selector:
    matchLabels:
      app: go-agent
  template:
    metadata:
      labels:
        app: go-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.goAgent.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: go-agent
          image: "{{ .Values.goAgent.image.repository }}:{{ .Values.goAgent.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.goAgent.port }}
          env:
            {{- include "cpaas.livekitEnvVars" . | nindent 12 }}
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cpaas-ai-secrets
                  key: gemini-api-key
            - name: FREESWITCH_ESL_HOST
              value: "freeswitch-svc.{{ .Values.global.namespaces.voipCore }}.svc.cluster.local:{{ .Values.freeswitch.ports.esl }}"
            - name: FREESWITCH_ESL_PASS
              valueFrom:
                secretKeyRef:
                  name: cpaas-freeswitch-secrets
                  key: esl-password
            - name: BACKEND_API_URL
              value: {{ include "cpaas.backendURL" . }}
            {{- include "cpaas.internalKeyEnv" . | nindent 12 }}
            - name: PORT
              value: "{{ .Values.goAgent.port }}"
          resources:
            {{- toYaml .Values.goAgent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.goAgent.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.goAgent.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: go-agent
  namespace: {{ .Values.global.namespaces.aiEngine }}
spec:
  type: ClusterIP
  selector:
    app: go-agent
  ports:
    - port: {{ .Values.goAgent.port }}
      targetPort: {{ .Values.goAgent.port }}
---
{{- if .Values.goAgent.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-agent-hpa
  namespace: {{ .Values.global.namespaces.aiEngine }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-agent
  minReplicas: {{ .Values.goAgent.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.goAgent.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.goAgent.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.goAgent.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- end }}
