---
# ── Global Secrets ───────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-global-secrets
type: Opaque
stringData:
  internal-api-key: {{ .Values.global.internalApiKey | quote }}
---
# ── LiveKit Secrets ──────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-livekit-secrets
type: Opaque
stringData:
  api-key: {{ .Values.livekit.apiKey | quote }}
  api-secret: {{ .Values.livekit.apiSecret | quote }}
---
# ── FreeSWITCH Secrets ───────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-freeswitch-secrets
type: Opaque
stringData:
  esl-password: {{ .Values.freeswitch.eslPassword | quote }}
  domain: {{ .Values.freeswitch.domain | quote }}
  sip-trunk-host: {{ .Values.freeswitch.sipTrunkHost | default "sip.example.com" | quote }}
---
# ── AI Secrets ───────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-ai-secrets
type: Opaque
stringData:
  gemini-api-key: {{ .Values.goAgent.geminiApiKey | quote }}
  esl-password: {{ .Values.freeswitch.eslPassword | quote }}
  internal-api-key: {{ .Values.global.internalApiKey | quote }}
---
# ── Backend Secrets ──────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-backend-secrets
type: Opaque
stringData:
  db-connection-string: {{ printf "Host=%s-postgresql.%s.svc.cluster.local;Port=5432;Database=%s;Username=%s;Password=%s" .Release.Name .Release.Namespace .Values.postgresql.auth.database .Values.postgresql.auth.username .Values.postgresql.auth.password | quote }}
  jwt-key: {{ .Values.backend.jwt.key | quote }}
---
# ── OpenSIPS Secrets ─────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-opensips-secrets
type: Opaque
stringData:
  db-password: {{ .Values.postgresql.auth.password | quote }}
