---
# ── Kubernetes Namespaces ─────────────────────────────────────────────
{{- $namespaces := list
  .Values.global.namespaces.voipEdge
  .Values.global.namespaces.voipCore
  .Values.global.namespaces.aiEngine
  .Values.global.namespaces.controlPlane
  .Values.global.namespaces.data
  .Values.global.namespaces.monitoring
}}
{{- range $ns := $namespaces }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: cpaas
---
{{- end }}

{{- if .Values.metallb.enabled }}
# ── MetalLB VoIP IP Pool ──────────────────────────────────────────────
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .Values.metallb.ipAddressPools.voip.name }}
  namespace: metallb-system
spec:
  addresses:
    {{- range .Values.metallb.ipAddressPools.voip.addresses }}
    - {{ . }}
    {{- end }}
  avoidBuggyIPs: true
---
# ── MetalLB Web IP Pool ───────────────────────────────────────────────
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .Values.metallb.ipAddressPools.web.name }}
  namespace: metallb-system
spec:
  addresses:
    {{- range .Values.metallb.ipAddressPools.web.addresses }}
    - {{ . }}
    {{- end }}
  avoidBuggyIPs: true
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: voip-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - {{ .Values.metallb.ipAddressPools.voip.name }}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: web-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - {{ .Values.metallb.ipAddressPools.web.name }}
{{- end }}
