---
# ── Global Secrets ───────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-global-secrets
  namespace: {{ .Values.global.namespaces.controlPlane }}
type: Opaque
stringData:
  internal-api-key: {{ .Values.global.internalApiKey | quote }}
---
# ── LiveKit Secrets ──────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-livekit-secrets
  namespace: {{ .Values.global.namespaces.aiEngine }}
type: Opaque
stringData:
  api-key: {{ .Values.livekit.apiKey | quote }}
  api-secret: {{ .Values.livekit.apiSecret | quote }}
---
# ── FreeSWITCH Secrets ───────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-freeswitch-secrets
  namespace: {{ .Values.global.namespaces.voipCore }}
type: Opaque
stringData:
  esl-password: {{ .Values.freeswitch.eslPassword | quote }}
  domain: {{ .Values.freeswitch.domain | quote }}
  sip-trunk-host: {{ .Values.freeswitch.sipTrunkHost | default "sip.example.com" | quote }}
---
# Copy FreeSWITCH secrets to AI Engine namespace (Go Agent needs ESL pass)
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-freeswitch-secrets
  namespace: {{ .Values.global.namespaces.aiEngine }}
type: Opaque
stringData:
  esl-password: {{ .Values.freeswitch.eslPassword | quote }}
---
# ── AI Secrets ───────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-ai-secrets
  namespace: {{ .Values.global.namespaces.aiEngine }}
type: Opaque
stringData:
  gemini-api-key: {{ .Values.goAgent.geminiApiKey | quote }}
  esl-password: {{ .Values.freeswitch.eslPassword | quote }}
  internal-api-key: {{ .Values.global.internalApiKey | quote }}
---
# ── Backend Secrets ──────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-backend-secrets
  namespace: {{ .Values.global.namespaces.controlPlane }}
type: Opaque
stringData:
  db-connection-string: {{ printf "Host=postgresql.%s.svc.cluster.local;Port=5432;Database=%s;Username=%s;Password=%s" .Release.Namespace .Values.postgresql.auth.database .Values.postgresql.auth.username .Values.postgresql.auth.password | quote }}
  jwt-key: {{ .Values.backend.jwt.key | quote }}
---
# ── OpenSIPS Secrets ─────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-opensips-secrets
  namespace: {{ .Values.global.namespaces.voipEdge }}
type: Opaque
stringData:
  db-password: {{ .Values.postgresql.auth.password | quote }}
---
# ── Global Secrets (cross-namespace copy for AI Engine) ──────────────
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-global-secrets
  namespace: {{ .Values.global.namespaces.aiEngine }}
type: Opaque
stringData:
  internal-api-key: {{ .Values.global.internalApiKey | quote }}
---
# Copy livekit secrets to voip-core for FreeSWITCH (if needed)
apiVersion: v1
kind: Secret
metadata:
  name: cpaas-livekit-secrets
  namespace: {{ .Values.global.namespaces.voipCore }}
type: Opaque
stringData:
  api-key: {{ .Values.livekit.apiKey | quote }}
  api-secret: {{ .Values.livekit.apiSecret | quote }}
