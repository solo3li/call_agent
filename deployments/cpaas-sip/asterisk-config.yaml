apiVersion: v1
kind: ConfigMap
metadata:
  name: asterisk-config
  namespace: default
data:
  pjsip.conf: |
    [transport-udp]
    type=transport
    protocol=udp
    bind=0.0.0.0:5060
    local_net=10.0.0.0/8
    local_net=172.16.0.0/12
    local_net=192.168.0.0/16
    
    [kamailio]
    type=endpoint
    transport=transport-udp
    context=from-internal
    disallow=all
    allow=ulaw,alaw
    aors=kamailio
    
    [kamailio]
    type=aor
    contact=sip:10.42.0.1:5060  # This doesn't strictly matter as we dial with @kamailio
    
    [kamailio]
    type=identify
    endpoint=kamailio
    match=10.42.0.0/16
    match=10.43.0.0/16
    
  extensions.conf: |
    [general]
    static=yes
    writeprotect=no
    
    [from-internal]
    exten => _X.,1,NoOp(Call from Kamailio to ${EXTEN})
    same => n,Dial(PJSIP/${EXTEN}@kamailio)
    same => n,Hangup()
