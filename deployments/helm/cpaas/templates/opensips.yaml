{{- if .Values.opensips.enabled }}
---
# ── OpenSIPS Deployment ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensips
  labels:
    app: opensips
    {{- include "cpaas.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.opensips.replicaCount }}
  selector:
    matchLabels:
      app: opensips
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: opensips
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.opensips.ports.mi }}"
        # Config is baked into image
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: opensips
          image: "{{ .Values.opensips.image.repository }}:{{ .Values.opensips.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: sip-udp
              containerPort: {{ .Values.opensips.ports.sip }}
              protocol: UDP
            - name: sip-tcp
              containerPort: {{ .Values.opensips.ports.sip }}
              protocol: TCP
            - name: mi-http
              containerPort: {{ .Values.opensips.ports.mi }}
              protocol: TCP
            - name: hep-udp
              containerPort: {{ .Values.opensips.ports.hep }}
              protocol: UDP
          env:
            - name: OPENSIPS_DB_HOST
              value: "{{ .Release.Name }}-postgresql.{{ .Release.Namespace }}.svc.cluster.local"
            - name: OPENSIPS_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: cpaas-opensips-secrets
                  key: db-password
            {{- include "cpaas.internalKeyEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.opensips.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.opensips.ports.sip }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.opensips.ports.sip }}
            initialDelaySeconds: 15
            periodSeconds: 5

---
# ── OpenSIPS Service (LoadBalancer via MetalLB) ──────────────────────
apiVersion: v1
kind: Service
metadata:
  name: opensips-sip
  labels:
    app: opensips
spec:
  type: ClusterIP
  selector:
    app: opensips
  ports:
    - name: sip-udp
      port: {{ .Values.opensips.ports.sip }}
      targetPort: {{ .Values.opensips.ports.sip }}
      protocol: UDP
    - name: sip-tcp
      port: {{ .Values.opensips.ports.sip }}
      targetPort: {{ .Values.opensips.ports.sip }}
      protocol: TCP
    - name: hep
      port: {{ .Values.opensips.ports.hep }}
      targetPort: {{ .Values.opensips.ports.hep }}
      protocol: UDP
---
# ── OpenSIPS Internal Service (Management Interface) ─────────────────
apiVersion: v1
kind: Service
metadata:
  name: opensips-mi
spec:
  type: ClusterIP
  selector:
    app: opensips
  ports:
    - port: {{ .Values.opensips.ports.mi }}
      targetPort: {{ .Values.opensips.ports.mi }}
---
{{- if .Values.opensips.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opensips-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opensips
  minReplicas: {{ .Values.opensips.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.opensips.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.opensips.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
