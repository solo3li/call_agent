apiVersion: v1
kind: ConfigMap
metadata:
  name: kamailio-config
  namespace: default
data:
  kamailio.cfg: |
    #!KAMAILIO
    
    ####### Global Parameters #########
    debug=2
    log_stderror=yes
    fork=yes
    children=4
    
    listen=udp:0.0.0.0:5060
    listen=tcp:0.0.0.0:5060
    
    ####### Modules Section ########
    mpath="/usr/lib/kamailio/modules/"
    
    loadmodule "db_postgres.so"
    loadmodule "tm.so"
    loadmodule "sl.so"
    loadmodule "rr.so"
    loadmodule "pv.so"
    loadmodule "maxfwd.so"
    loadmodule "textops.so"
    loadmodule "siputils.so"
    loadmodule "xlog.so"
    loadmodule "sanity.so"
    loadmodule "auth.so"
    loadmodule "auth_db.so"
    loadmodule "usrloc.so"
    loadmodule "registrar.so"
    loadmodule "ctl.so"
    loadmodule "cfg_rpc.so"
    
    # DB URL
    #!define DBURL "postgres://postgres:supersecurepassword@postgres.default.svc.cluster.local:5432/cpaas_db"
    
    # Auth DB
    modparam("auth_db", "db_url", DBURL)
    modparam("auth_db", "calculate_ha1", yes)
    modparam("auth_db", "password_column", "password")
    modparam("auth_db", "user_column", "username")
    modparam("auth_db", "use_domain", 0)
    modparam("auth_db", "load_credentials", "")
    
    # Usrloc (RAM only)
    modparam("usrloc", "db_url", DBURL)
    modparam("usrloc", "db_mode", 0)
    
    # Registrar
    modparam("registrar", "default_expires", 3600)
    
    ####### Routing Logic ########
    request_route {
        xlog("L_INFO", "=== SIP MSG: $rm from $si:$sp to RURI=$ru (src_ip=$si) ===\n");
        route(REQINIT);
        
        # Handle requests within dialogs
        if (has_totag()) {
            if (loose_route()) {
                route(RELAY);
                exit;
            }
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    route(RELAY);
                    exit;
                } else {
                    exit;
                }
            }
            sl_send_reply("404", "Not here");
            exit;
        }
        
        # CANCEL processing
        if (is_method("CANCEL")) {
            if (t_check_trans()) {
                route(RELAY);
            }
            exit;
        }
        
        t_check_trans();
        
        # Handle REGISTRATIONS
        if (is_method("REGISTER")) {
            route(AUTH);
            if (!save("location")) {
                sl_reply_error();
            }
            exit;
        }
        
        # Handle INVITEs
        if (is_method("INVITE")) {
            record_route();
            
            # If the INVITE is coming from Asterisk, it means Asterisk has processed it
            # and wants to send it to the actual destination.
            if (src_ip == 10.42.0.0/16 || src_ip == 10.43.0.0/16) {
                # Look up the registered user in memory
                if (!lookup("location")) {
                    send_reply("404", "Not Found");
                    exit;
                }
                route(RELAY);
                exit;
            }
            
            # If the INVITE is from a User, we authenticate it first!
            route(AUTH);
            
            # Then we send the call to Asterisk for media/B2BUA processing
            $du = "sip:asterisk-headless.default.svc.cluster.local:5060";
            route(RELAY);
            exit;
        }
        
        # Relay everything else
        route(RELAY);
    }
    
    route[REQINIT] {
        if (!mf_process_maxfwd_header("10")) {
            sl_send_reply("483", "Too Many Hops");
            exit;
        }
        if (!sanity_check("1511", "7")) {
            xlog("Malformed SIP message from $si:$sp\n");
            exit;
        }
    }
    
    route[AUTH] {
        # Challenge using the requested domain as the realm
        if (!auth_check("cpaas.178.62.192.74.nip.io", "subscriber", "1")) {
            auth_challenge("cpaas.178.62.192.74.nip.io", "0");
            exit;
        }
        consume_credentials();
    }
    
    route[RELAY] {
        if (!t_relay()) {
            sl_reply_error();
        }
        exit;
    }
