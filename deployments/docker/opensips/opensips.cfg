##########################################################
# OpenSIPS 3.5 Configuration — CPaaS Voice AI Platform
# Role: SIP Edge Proxy, Load Balancer, Fraud Guard, CDR Logger
##########################################################

####### Global Parameters #########
log_level=3
log_stderror=yes
log_facility=LOG_LOCAL0

debug_mode=no

fork=yes
children=4

# Network Interfaces
listen=udp:0.0.0.0:5060 use_workers 4
listen=tcp:0.0.0.0:5060 use_workers 2
listen=hep_udp:0.0.0.0:9060   # HEP for call mirroring/monitoring

# OpenSIPS Management Interface (REST API)
listen=http:0.0.0.0:8888

####### Modules Section ########

# --- Core Transport ---
loadmodule "proto_udp.so"
loadmodule "proto_tcp.so"
loadmodule "proto_hep.so"

# --- SIP Routing ---
loadmodule "signaling.so"
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "sipmsgops.so"

# --- Authentication ---
loadmodule "auth.so"
loadmodule "auth_db.so"

# --- Database ---
loadmodule "db_mysql.so"

# --- Load Balancing & Dispatching ---
loadmodule "dispatcher.so"

# --- Dialog Tracking (for CDR) ---
loadmodule "dialog.so"

# --- CDR/Accounting ---
loadmodule "acc.so"

# --- RTPEngine Media Proxy ---
loadmodule "rtpengine.so"

# --- Anti-Fraud ---
loadmodule "pike.so"

# --- HTTP REST (Management Interface) ---
loadmodule "httpd.so"
loadmodule "mi_http.so"
loadmodule "json.so"

# --- UAC (for outbound calls) ---
loadmodule "uac.so"

####### Module Parameters ########

# Database Connection (PostgreSQL via MySQL-compatible protocol or native)
# For PostgreSQL: use db_postgres.so instead
modparam("auth_db|acc|dispatcher", "db_url",
    "mysql://opensips:${OPENSIPS_DB_PASS}@${OPENSIPS_DB_HOST}/opensips")

# RTPEngine — media proxy connection
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine-svc.voip-edge.svc.cluster.local:22222")
modparam("rtpengine", "rtpengine_retr", 3)

# Dispatcher — load balancing to FreeSWITCH cluster
# ds_ping_method: periodic OPTIONS ping to detect FreeSWITCH health
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_ping_interval", 10)
modparam("dispatcher", "ds_probing_mode", 1)
modparam("dispatcher", "ds_inactive_threshold", 3)
modparam("dispatcher", "ds_db_url",
    "mysql://opensips:${OPENSIPS_DB_PASS}@${OPENSIPS_DB_HOST}/opensips")

# Auth DB
modparam("auth_db", "db_table", "subscriber")
modparam("auth_db", "user_column", "username")
modparam("auth_db", "domain_column", "domain")
modparam("auth_db", "password_column", "password")
modparam("auth_db", "calculate_ha1", 1)

# Dialog tracking
modparam("dialog", "db_mode", 1)
modparam("dialog", "default_timeout", 3600)

# CDR Accounting — log all calls to DB
modparam("acc", "db_flag", 1)
modparam("acc", "db_missed_flag", 2)
modparam("acc", "log_flag", 1)
modparam("acc", "db_url",
    "mysql://opensips:${OPENSIPS_DB_PASS}@${OPENSIPS_DB_HOST}/opensips")
modparam("acc", "db_table_acc", "acc")
modparam("acc", "db_extra", "src_ip=$si;call_id=$ci;tenant_id=$avp(tenant_id)")

# Anti-Flood/DDoS Protection
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# HTTP Management Interface
modparam("httpd", "port", 8888)

# Record-Route
modparam("rr", "enable_full_lr", 1)

####### Routing Logic ########

# Main SIP Request Handler
route {
    # ---- 1. Basic sanity checks ----
    if (!mf_process_maxfwd_header(10)) {
        sl_send_reply(483, "Too Many Hops");
        exit;
    }

    if (has_totag()) {
        # In-dialog request (re-INVITE, BYE, etc.)
        if (loose_route()) {
            route(RELAY);
        } else {
            sl_send_reply(404, "Not Found");
        }
        exit;
    }

    # ---- 2. Anti-flood protection ----
    if (pike_check_req()) {
        xlog("L_WARN", "PIKE: Blocked IP $si due to excessive requests\n");
        sl_send_reply(503, "Server Overloaded");
        exit;
    }

    # ---- 3. Record Route for in-dialog messages ----
    record_route();

    # ---- 4. Handle REGISTER (SIP Trunk Registration) ----
    if (is_method("REGISTER")) {
        route(REGISTER);
        exit;
    }

    # ---- 5. Handle INVITE (New Call) ----
    if (is_method("INVITE")) {
        route(INVITE_HANDLER);
        exit;
    }

    # ---- 6. Handle OPTIONS (Health check from FreeSWITCH) ----
    if (is_method("OPTIONS")) {
        sl_send_reply(200, "OK");
        exit;
    }

    # ---- 7. Pass other in-dialog methods ----
    route(RELAY);
}

# ===========================================================
# REGISTER Handler — SIP Trunk Authentication
# ===========================================================
route[REGISTER] {
    if (!www_authorize("", "subscriber")) {
        www_challenge("", "auth");
        exit;
    }
    if (!save("location")) {
        sl_reply_error();
    }
    exit;
}

# ===========================================================
# INVITE Handler — New Inbound Call
# ===========================================================
route[INVITE_HANDLER] {
    # Start CDR tracking
    setflag(1); # ACC flag
    create_dialog();

    # Engage RTPEngine for NAT traversal & SRTP handling
    # replace-origin: fix SDP origin for NAT
    # replace-session-connection: fix SDP connection line
    # rtcp-mux: enable RTCP multiplexing (WebRTC requirement)
    if (!rtpengine_manage("replace-origin replace-session-connection rtcp-mux")) {
        xlog("L_ERR", "RTPEngine: Failed to manage RTP for $ci\n");
        sl_send_reply(500, "RTP Engine Error");
        exit;
    }

    # Load balance to FreeSWITCH cluster (Group 1 = FreeSWITCH nodes)
    # Algorithm 4 = Round-Robin with weight support
    if (!ds_select_dst(1, 4)) {
        xlog("L_ERR", "Dispatcher: No active FreeSWITCH nodes available!\n");
        sl_send_reply(503, "No VoIP Nodes Available");
        exit;
    }

    xlog("L_INFO", "INVITE: Routing call $ci from $si to FreeSWITCH at $du\n");

    # Relay to selected FreeSWITCH
    route(RELAY);
}

# ===========================================================
# RELAY — Forward request to destination
# ===========================================================
route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# ===========================================================
# Failure Route — Handle FreeSWITCH failures
# ===========================================================
failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) {
        exit;
    }

    # Try next FreeSWITCH node on failure
    if (t_check_status("503") || t_check_status("408")) {
        if (ds_next_dst()) {
            xlog("L_WARN", "FAILOVER: Retrying on next FreeSWITCH node for $ci\n");
            route(RELAY);
            exit;
        }
    }

    xlog("L_ERR", "All FreeSWITCH nodes failed for call $ci\n");
    t_reply(503, "All VoIP Nodes Unavailable");
}

